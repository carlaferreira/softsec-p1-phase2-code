<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Reimbursement Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #e1e5eb;
      --primary: #4f6ef7;
      --primary-dark: #3a56d4;
      --danger: #e53e3e;
      --success: #38a169;
      --warning: #d69e2e;
      --text: #1a202c;
      --muted: #718096;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); font-size: 14px; }

    /* ── Auth ── */
    #auth-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 40px; width: 360px; box-shadow: var(--shadow);
    }
    .auth-card h1 { font-size: 18px; margin-bottom: 6px; }
    .auth-card p  { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    /* ── App shell ── */
    #app-screen { display: none; min-height: 100vh; flex-direction: column; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 52px;
    }
    header .brand { font-weight: 700; font-size: 15px; color: var(--primary); flex: 1; }
    header .user-info { font-size: 13px; color: var(--muted); }
    header .badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      background: #ebf0ff; color: var(--primary); text-transform: uppercase; letter-spacing: .4px;
    }

    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; gap: 2px;
    }
    nav button {
      background: none; border: none; padding: 12px 16px; cursor: pointer;
      font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    nav button:hover  { color: var(--text); }
    nav button.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

    main { flex: 1; padding: 24px; max-width: 1000px; width: 100%; margin: 0 auto; }

    .section { display: none; }
    .section.active { display: block; }

    /* ── Forms ── */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; background: var(--surface); color: var(--text);
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary);
    }
    textarea { resize: vertical; min-height: 72px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius); border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-danger   { background: var(--danger);  color: #fff; }
    .btn-success  { background: var(--success); color: #fff; }
    .btn-ghost    { background: transparent; color: var(--muted);
                    border: 1px solid var(--border); }
    .btn-sm       { padding: 4px 10px; font-size: 12px; }
    .btn-full     { width: 100%; justify-content: center; }

    /* ── Cards / Tables ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .card-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h2 { font-size: 15px; }
    .card-body { padding: 18px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 700;
         color: var(--muted); text-transform: uppercase; letter-spacing: .4px;
         border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    /* ── Status badges ── */
    .status {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    .status-pending  { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }

    /* ── Search bar ── */
    .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-row input { flex: 1; }

    /* ── Alert ── */
    .alert {
      padding: 10px 14px; border-radius: var(--radius); font-size: 13px;
      margin-bottom: 14px; display: none;
    }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert.show { display: block; }

    /* ── Submit form ── */
    .form-card { background: var(--surface); border: 1px solid var(--border);
                 border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Audit log ── */
    .log-entry {
      font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace;
      padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text);
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .log-time { color: var(--muted); margin-right: 10px; }
    .log-entry .log-action { font-weight: 700; margin-right: 8px; }
    .log-entry .log-outcome-success { color: var(--success); }
    .log-entry .log-outcome-failure { color: var(--danger); }

    /* ── Logout ── */
    #btn-logout {
      background: none; border: none; color: var(--muted); font-size: 13px;
      cursor: pointer; padding: 4px 8px; border-radius: var(--radius);
    }
    #btn-logout:hover { background: var(--bg); color: var(--text); }
  </style>
</head>
<body>

<!-- ══════════════ AUTH ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>Expense Platform</h1>
    <p>Sign in to continue</p>
    <div id="auth-alert" class="alert alert-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input id="inp-username" type="text" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="inp-password" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn btn-primary btn-full" type="submit">Sign in</button>
    </form>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app-screen">
  <header>
    <span class="brand">💼 Expense Platform</span>
    <span class="user-info" id="header-user"></span>
    <span class="badge" id="header-role"></span>
    <button id="btn-logout">Sign out</button>
  </header>

  <nav id="main-nav">
    <button class="active" data-tab="expenses">Expenses</button>
    <button data-tab="submit">Submit Expense</button>
    <button data-tab="users" id="nav-users" style="display:none">Users</button>
    <button data-tab="audit" id="nav-audit" style="display:none">Audit Log</button>
  </nav>

  <main>
    <!-- ── Expenses ── -->
    <div class="section active" id="tab-expenses">
      <div class="card">
        <div class="card-header">
          <h2>Expenses</h2>
        </div>
        <div class="card-body">
          <div class="search-row">
            <input id="search-input" type="text" placeholder="Search description or category…" />
            <button class="btn btn-ghost" id="btn-search">Search</button>
            <button class="btn btn-ghost" id="btn-refresh">↺ Refresh</button>
          </div>
          <div id="expenses-alert" class="alert alert-error"></div>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Description</th>
                <th>Department</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="expenses-tbody"></tbody>
          </table>
          <div id="expenses-empty" class="empty" style="display:none">No expenses found.</div>
        </div>
      </div>
    </div>

    <!-- ── Submit ── -->
    <div class="section" id="tab-submit">
      <div class="form-card">
        <h2 style="margin-bottom:20px;font-size:15px;">Submit New Expense</h2>
        <div id="submit-alert" class="alert"></div>
        <form id="submit-form">
          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select id="inp-category" required>
                <option value="">— select —</option>
                <option value="meals">Meals</option>
                <option value="travel">Travel</option>
                <option value="accommodation">Accommodation</option>
                <option value="equipment">Equipment</option>
                <option value="conference">Conference</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Amount (€)</label>
              <input id="inp-amount" type="number" min="0.01" step="0.01" required />
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="inp-desc" required></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Submit</button>
        </form>
      </div>
    </div>

    <!-- ── Users ── -->
    <div class="section" id="tab-users">
      <div class="card">
        <div class="card-header"><h2>Users</h2></div>
        <div class="card-body">
          <div id="users-alert" class="alert alert-error"></div>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Username</th>
                <th>Full Name</th>
                <th>Role</th>
                <th>Department</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody"></tbody>
          </table>
          <div id="users-empty" class="empty" style="display:none">No users found.</div>
        </div>
      </div>
    </div>

    <!-- ── Audit ── -->
    <div class="section" id="tab-audit">
      <div class="card">
        <div class="card-header">
          <h2>Audit Log</h2>
          <button class="btn btn-ghost btn-sm" id="btn-audit-refresh">↺ Refresh</button>
        </div>
        <div id="audit-log"></div>
        <div id="audit-empty" class="empty" style="display:none">No audit entries.</div>
      </div>
    </div>
  </main>
</div>

<script>
  const API = 'http://localhost:3000/api';
  let token = null;
  let currentUser = null;

  // ── Helpers ──────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  function showAlert(id, msg, type = 'error') {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
    if (type === 'success') setTimeout(() => el.classList.remove('show'), 3000);
  }

  function fmt(amount, currency = 'EUR') {
    return new Intl.NumberFormat('pt-PT', { style: 'currency', currency }).format(amount);
  }

  function statusBadge(s) {
    return `<span class="status status-${s}">${s}</span>`;
  }

  // ── Auth ─────────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const username = document.getElementById('inp-username').value.trim();
    const password = document.getElementById('inp-password').value;
    try {
      const data = await api('POST', '/auth/login', { username, password });
      token = data.token;
      currentUser = data.user;
      enterApp();
    } catch (err) {
      showAlert('auth-alert', err.message);
    }
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    token = null; currentUser = null;
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('inp-password').value = '';
  });

  function enterApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('header-user').textContent = currentUser.username;
    document.getElementById('header-role').textContent = currentUser.role.replace('_', ' ');

    const isAdmin = currentUser.role === 'finance_admin';
    document.getElementById('nav-users').style.display = isAdmin ? '' : 'none';
    document.getElementById('nav-audit').style.display = isAdmin ? '' : 'none';

    switchTab('expenses');
    loadExpenses();
  }

  // ── Tabs ─────────────────────────────────────────────────
  document.getElementById('main-nav').addEventListener('click', e => {
    if (e.target.dataset.tab) switchTab(e.target.dataset.tab);
  });

  function switchTab(tab) {
    document.querySelectorAll('#main-nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === `tab-${tab}`));
    if (tab === 'expenses') loadExpenses();
    if (tab === 'users')    loadUsers();
    if (tab === 'audit')    loadAudit();
  }

  // ── Expenses ─────────────────────────────────────────────
  async function loadExpenses(q) {
    try {
      const path = q ? `/expenses/search?q=${encodeURIComponent(q)}` : '/expenses';
      const rows = await api('GET', path);
      renderExpenses(rows);
    } catch (err) {
      showAlert('expenses-alert', err.message);
    }
  }

  function renderExpenses(rows) {
    const tbody = document.getElementById('expenses-tbody');
    const empty = document.getElementById('expenses-empty');
    const isManagerOrAdmin = ['manager', 'finance_admin'].includes(currentUser.role);
    const isAdmin = currentUser.role === 'finance_admin';

    if (!rows.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';

    tbody.innerHTML = rows.map(r => {
      const canApprove = isManagerOrAdmin && r.status === 'pending';
      const actions = [
        canApprove ? `<button class="btn btn-success btn-sm" onclick="approveExpense(${r.id})">Approve</button>` : '',
        canApprove ? `<button class="btn btn-danger btn-sm" onclick="rejectExpense(${r.id})">Reject</button>` : '',
        isAdmin     ? `<button class="btn btn-ghost btn-sm" onclick="deleteExpense(${r.id})">Delete</button>` : '',
      ].filter(Boolean).join(' ');

      return `<tr>
        <td>${r.id}</td>
        <td>${r.category}</td>
        <td>${fmt(r.amount, r.currency)}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.description)}">${esc(r.description)}</td>
        <td>${r.department}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${actions || '—'}</td>
      </tr>`;
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('btn-search').addEventListener('click', () => {
    loadExpenses(document.getElementById('search-input').value.trim());
  });
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadExpenses(document.getElementById('search-input').value.trim());
  });
  document.getElementById('btn-refresh').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    loadExpenses();
  });

  async function approveExpense(id) {
    try {
      await api('POST', `/expenses/${id}/approve`);
      loadExpenses();
    } catch (err) { showAlert('expenses-alert', err.message); }
  }
  async function rejectExpense(id) {
    try {
      await api('POST', `/expenses/${id}/reject`);
      loadExpenses();
    } catch (err) { showAlert('expenses-alert', err.message); }
  }
  async function deleteExpense(id) {
    if (!confirm(`Delete expense #${id}?`)) return;
    try {
      await api('DELETE', `/expenses/${id}`);
      loadExpenses();
    } catch (err) { showAlert('expenses-alert', err.message); }
  }

  // ── Submit ───────────────────────────────────────────────
  document.getElementById('submit-form').addEventListener('submit', async e => {
    e.preventDefault();
    const body = {
      category:    document.getElementById('inp-category').value,
      amount:      parseFloat(document.getElementById('inp-amount').value),
      description: document.getElementById('inp-desc').value.trim(),
    };
    try {
      const data = await api('POST', '/expenses', body);
      showAlert('submit-alert', `Expense #${data.id} submitted — status: ${data.status}`, 'success');
      document.getElementById('submit-form').reset();
    } catch (err) {
      showAlert('submit-alert', err.message);
    }
  });

  // ── Users ────────────────────────────────────────────────
  async function loadUsers() {
    try {
      const rows = await api('GET', '/users');
      renderUsers(rows);
    } catch (err) { showAlert('users-alert', err.message); }
  }

  function renderUsers(rows) {
    const tbody = document.getElementById('users-tbody');
    const empty = document.getElementById('users-empty');
    if (!rows.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';

    tbody.innerHTML = rows.map(r => `<tr>
      <td>${r.id}</td>
      <td>${esc(r.username)}</td>
      <td>${esc(r.full_name)}</td>
      <td>
        <select class="role-select" data-id="${r.id}" style="width:auto">
          <option value="employee"      ${r.role==='employee'      ?'selected':''}>employee</option>
          <option value="manager"       ${r.role==='manager'       ?'selected':''}>manager</option>
          <option value="finance_admin" ${r.role==='finance_admin' ?'selected':''}>finance_admin</option>
        </select>
      </td>
      <td>${esc(r.department)}</td>
      <td><button class="btn btn-primary btn-sm" onclick="saveRole(${r.id})">Save</button></td>
    </tr>`).join('');
  }

  async function saveRole(id) {
    const sel = document.querySelector(`.role-select[data-id="${id}"]`);
    try {
      await api('PATCH', `/users/${id}`, { role: sel.value });
      showAlert('users-alert', 'Role updated.', 'success');
    } catch (err) { showAlert('users-alert', err.message); }
  }

  // ── Audit ────────────────────────────────────────────────
  async function loadAudit() {
    try {
      const rows = await api('GET', '/audit?limit=100');
      renderAudit(rows);
    } catch (err) {}
  }

  function renderAudit(rows) {
    const container = document.getElementById('audit-log');
    const empty = document.getElementById('audit-empty');
    if (!rows.length) { container.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';

    container.innerHTML = rows.map(r => {
      const outcomeClass = r.outcome === 'success' ? 'log-outcome-success' : 'log-outcome-failure';
      const detail = r.detail ? ` — ${r.detail}` : '';
      return `<div class="log-entry">
        <span class="log-time">${new Date(r.created_at).toLocaleString('pt-PT')}</span>
        <span class="log-action">${esc(r.action)}</span>
        <span class="${outcomeClass}">${esc(r.outcome)}</span>
        <span style="color:var(--muted)">${esc(r.username || '')}${esc(detail)}</span>
      </div>`;
    }).join('');
  }

  document.getElementById('btn-audit-refresh').addEventListener('click', loadAudit);
</script>
</body>
</html>
